name: Soundcheck Security Review
description: "OWASP security review that comments a severity-ranked findings table on every PR, and can rewrite Critical/High/Medium findings in place."

branding:
  icon: shield
  color: red

inputs:
  anthropic-api-key:
    description: Anthropic API key (use a repository secret)
    required: true
  github-token:
    description: >
      GitHub token with pull-requests:write. Also contents:write if
      autofix is enabled so rewrites can be committed back to the branch.
      Use secrets.GITHUB_TOKEN for most repos.
    required: true
  base-branch:
    description: "Branch to diff against on PRs and open PRs into on scheduled runs (default: the repo's default branch)"
    required: false
    default: "${{ github.event.repository.default_branch }}"
  model:
    description: "Claude model to use for the review (accepts any value `claude -p --model` accepts: short alias like `sonnet`/`haiku` or a full model id)"
    required: false
    default: sonnet
  autofix:
    description: "If true, grant the reviewer Edit access so it can rewrite vulnerable code. Requires github-token with contents:write. Defaults to false; enable only after confirming branch-protection and human-review requirements are in place."
    required: false
    default: "false"
  max-budget-usd:
    description: Aggregate spend cap (USD) across the review + any autofix pass
    required: false
    default: "5"
  timeout-seconds:
    description: Subprocess timeout passed through to the reviewer CLI
    required: false
    default: "900"

outputs:
  pr-url:
    description: URL of the opened/updated PR (scheduled runs) or the triggering PR (pull_request runs). Empty when nothing was posted.
    value: ${{ steps.post.outputs.pr-url }}
  findings-count:
    description: Total findings returned by the reviewer
    value: ${{ steps.review.outputs.findings-count }}
  exit-code:
    description: Exit code from the reviewer CLI (0 clean, 1 Critical/High findings, 2 infrastructure error)
    value: ${{ steps.review.outputs.exit-code }}

runs:
  using: composite

  steps:
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.11"

    - name: Set up Node
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: "20"

    - name: Install claude CLI
      shell: bash
      run: npm install -g '@anthropic-ai/claude-code@2.1.108' --ignore-scripts

    - name: Check out soundcheck at pinned SHA
      shell: bash
      run: |
        # Pin to a specific commit SHA to prevent supply-chain substitution.
        # Update this SHA when intentionally pulling in new soundcheck changes.
        SOUNDCHECK_SHA="29006167de36a4d9fccca2619592c96d5dc1813c"
        git clone --filter=blob:none https://github.com/thejefflarson/soundcheck /tmp/soundcheck
        git -C /tmp/soundcheck checkout "$SOUNDCHECK_SHA"

    - name: Run security review
      id: review
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        # Pass all caller-supplied values via env to prevent shell injection
        # (finding: unsafe-api-consumption, injection).
        SOUNDCHECK_MODEL: ${{ inputs.model }}
        SOUNDCHECK_BUDGET: ${{ inputs.max-budget-usd }}
        SOUNDCHECK_TIMEOUT: ${{ inputs.timeout-seconds }}
        SOUNDCHECK_AUTOFIX: ${{ inputs.autofix }}
        SOUNDCHECK_EVENT: ${{ github.event_name }}
        SOUNDCHECK_BASE: ${{ inputs.base-branch }}
        SOUNDCHECK_BEFORE: ${{ github.event.before }}
      run: |
        # Validate and cap timeout to prevent unbounded runner consumption
        # (finding: insecure-design).
        TIMEOUT_VAL="${SOUNDCHECK_TIMEOUT:-900}"
        if ! [[ "$TIMEOUT_VAL" =~ ^[0-9]+$ ]] || [ "$TIMEOUT_VAL" -gt 3600 ]; then
          TIMEOUT_VAL=900
        fi

        EVENT="$SOUNDCHECK_EVENT"
        BASE="$SOUNDCHECK_BASE"

        # Assemble the CLI args. PRs get a diff-scoped review against the
        # base branch; schedule/workflow_dispatch runs do a full-repo scan.
        ARGS=(
          --repo-dir "$GITHUB_WORKSPACE"
          --skill-path /tmp/soundcheck/.claude/skills/security-review/SKILL.md
          --model "$SOUNDCHECK_MODEL"
          --max-budget-usd "$SOUNDCHECK_BUDGET"
          --timeout "$TIMEOUT_VAL"
          --output-summary /tmp/soundcheck-summary.md
          --audit-log /tmp/soundcheck-audit.json
        )

        if [ "$EVENT" = "pull_request" ]; then
          # Fetch the base branch so --diff-base has something to diff against.
          git -C "$GITHUB_WORKSPACE" fetch --no-tags --depth=1 origin "$BASE"
          ARGS+=(--diff-base "origin/$BASE")
        elif [ "$EVENT" = "push" ]; then
          # Diff the push against the pre-push tip of the branch.
          # For brand-new branches (before=zeros) fall through to a full scan.
          BEFORE="$SOUNDCHECK_BEFORE"
          ZERO="0000000000000000000000000000000000000000"
          if [ -n "$BEFORE" ] && [ "$BEFORE" != "$ZERO" ]; then
            git -C "$GITHUB_WORKSPACE" fetch --no-tags --depth=1 origin "$BEFORE" 2>/dev/null || true
            ARGS+=(--diff-base "$BEFORE")
          fi
        fi

        if [ "$SOUNDCHECK_AUTOFIX" = "true" ]; then
          ARGS+=(--autofix)
        fi

        # Capture exit without globally disabling errexit (finding: security-misconfiguration).
        # The reviewer exits 1 on Critical/High findings and 2 on infra error;
        # both are non-fatal for the step so we can still post comments.
        CLI_EXIT=0
        python /tmp/soundcheck/scripts/security-review-action.py "${ARGS[@]}" || CLI_EXIT=$?
        echo "exit-code=$CLI_EXIT" >> "$GITHUB_OUTPUT"

        if [ -f /tmp/soundcheck-audit.json ]; then
          # jq is preinstalled on ubuntu-latest runners
          FINDINGS=$(jq '.findings_total // 0' /tmp/soundcheck-audit.json)
        else
          FINDINGS=0
        fi
        echo "findings-count=$FINDINGS" >> "$GITHUB_OUTPUT"

    - name: Detect rewrites
      id: changes
      shell: bash
      run: |
        cd "$GITHUB_WORKSPACE"
        if git diff --quiet; then
          echo "has-changes=false" >> "$GITHUB_OUTPUT"
        else
          echo "has-changes=true" >> "$GITHUB_OUTPUT"
          echo "Rewritten files:"
          git diff --name-only
        fi

    - name: Commit and push rewrites
      id: push
      if: steps.changes.outputs.has-changes == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        # Isolate attacker-controlled values from shell expansion
        # (finding: injection — github.head_ref is PR branch name).
        SOUNDCHECK_EVENT: ${{ github.event_name }}
        SOUNDCHECK_HEAD_REF: ${{ github.head_ref }}
        SOUNDCHECK_BASE: ${{ inputs.base-branch }}
      run: |
        cd "$GITHUB_WORKSPACE"
        git config user.name  "soundcheck[bot]"
        git config user.email "soundcheck[bot]@users.noreply.github.com"
        COMMIT_MSG=$'Soundcheck: apply security review fixes\n\nAutomated rewrites from the Soundcheck security review action.'

        # GITHUB_TOKEN is not allowed to modify .github/workflows/*; exclude
        # those paths so pushes don't get rejected when autofix touches them.
        # Use -u (tracked files only) to avoid staging untracked files created
        # by untrusted diff content (finding: integrity-failures).
        STAGE_SPEC=(-- . ':!.github/workflows')

        if [ "$SOUNDCHECK_EVENT" = "pull_request" ]; then
          BRANCH="$SOUNDCHECK_HEAD_REF"
          git add -u "${STAGE_SPEC[@]}"
          if git diff --cached --quiet; then
            echo "Only workflow-file rewrites; nothing the default token can push."
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "$COMMIT_MSG"
          git push origin "HEAD:$BRANCH"
        else
          BRANCH="soundcheck/security-review"
          BASE="$SOUNDCHECK_BASE"
          # Stash rewrites, reset to a clean copy of the base, then replay.
          git stash push --include-untracked
          git fetch --no-tags origin "$BASE"
          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            git fetch --no-tags origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BASE"
          else
            git checkout -b "$BRANCH" "origin/$BASE"
          fi
          git stash pop
          git add -u "${STAGE_SPEC[@]}"
          if git diff --cached --quiet; then
            echo "Only workflow-file rewrites; nothing the default token can push."
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "$COMMIT_MSG"
          # Re-fetch remote tip immediately before push so --force-with-lease
          # checks the correct remote state, not a stale tracking ref
          # (finding: integrity-failures).
          git fetch --no-tags origin "$BRANCH" 2>/dev/null || true
          git push origin "$BRANCH" --force-with-lease
        fi
        echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

    - name: Post findings
      id: post
      if: always()
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        # Isolate all context values from shell expansion
        # (finding: injection, insecure-output-handling).
        SOUNDCHECK_EVENT: ${{ github.event_name }}
        SOUNDCHECK_PR_NUMBER: ${{ github.event.pull_request.number }}
        SOUNDCHECK_REPO: ${{ github.repository }}
        SOUNDCHECK_PUSH_BRANCH: ${{ steps.push.outputs.branch }}
        SOUNDCHECK_BASE: ${{ inputs.base-branch }}
      run: |
        BODY_FILE=/tmp/soundcheck-summary.md
        if [ ! -f "$BODY_FILE" ]; then
          echo "No summary file generated; skipping PR/comment."
          exit 0
        fi

        # Truncate to prevent oversized PR comments (finding: insecure-design).
        MAX_BYTES=65536
        if [ "$(wc -c < "$BODY_FILE")" -gt "$MAX_BYTES" ]; then
          { head -c "$MAX_BYTES" "$BODY_FILE"; printf '\n\n*(truncated — see audit artifact for full output)*\n'; } > "${BODY_FILE}.tmp"
          mv "${BODY_FILE}.tmp" "$BODY_FILE"
        fi

        if [ "$SOUNDCHECK_EVENT" = "pull_request" ]; then
          PR_NUMBER="$SOUNDCHECK_PR_NUMBER"
          gh pr comment "$PR_NUMBER" --body-file "$BODY_FILE" \
            --repo "$SOUNDCHECK_REPO"
          PR_URL=$(gh pr view "$PR_NUMBER" --json url --jq '.url' \
            --repo "$SOUNDCHECK_REPO")
          echo "pr-url=$PR_URL" >> "$GITHUB_OUTPUT"
        elif [ -n "$SOUNDCHECK_PUSH_BRANCH" ]; then
          # Only open a PR if the push step actually committed + pushed a
          # branch. The `changes` step's has-changes can be true even when
          # only workflow files were rewritten (which the default token
          # cannot push), in which case push.outputs.branch is empty.
          BRANCH="$SOUNDCHECK_PUSH_BRANCH"
          BASE="$SOUNDCHECK_BASE"
          TITLE="Soundcheck: security review findings"
          EXISTING=$(gh pr list \
            --head "$BRANCH" --base "$BASE" --state open \
            --json number --jq '.[0].number' \
            --repo "$SOUNDCHECK_REPO" 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            gh pr edit "$EXISTING" --body-file "$BODY_FILE" \
              --repo "$SOUNDCHECK_REPO"
            PR_URL=$(gh pr view "$EXISTING" --json url --jq '.url' \
              --repo "$SOUNDCHECK_REPO")
          else
            PR_URL=$(gh pr create \
              --title "$TITLE" --body-file "$BODY_FILE" \
              --head "$BRANCH" --base "$BASE" \
              --repo "$SOUNDCHECK_REPO" \
              --label security 2>/dev/null || \
            gh pr create \
              --title "$TITLE" --body-file "$BODY_FILE" \
              --head "$BRANCH" --base "$BASE" \
              --repo "$SOUNDCHECK_REPO")
          fi
          # AI-authored PRs require explicit human review before merging;
          # auto-merge is intentionally omitted (finding: insecure-design,
          # excessive-agency). The PR will stay open until a human approves.
          echo "pr-url=$PR_URL" >> "$GITHUB_OUTPUT"
        fi

    - name: Write job summary
      if: always()
      shell: bash
      env:
        SOUNDCHECK_PR_URL: ${{ steps.post.outputs.pr-url }}
      run: |
        if [ -f /tmp/soundcheck-summary.md ]; then
          # Cap size to prevent oversized step summaries (finding: insecure-output-handling).
          head -c 1000000 /tmp/soundcheck-summary.md >> "$GITHUB_STEP_SUMMARY"
        else
          echo "No summary generated." >> "$GITHUB_STEP_SUMMARY"
        fi
        if [ -n "$SOUNDCHECK_PR_URL" ]; then
          {
            echo
            echo "**PR:** $SOUNDCHECK_PR_URL"
          } >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Upload audit record
      # Skip upload on pull_request: the artifact would be publicly accessible
      # to the PR author before any fix is applied, disclosing vulnerability
      # details (finding: sensitive-disclosure).
      if: always() && github.event_name != 'pull_request'
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: soundcheck-audit
        path: /tmp/soundcheck-audit.json
        if-no-files-found: ignore
        retention-days: 14
