name: Soundcheck Security Review
description: "OWASP security review that comments a severity-ranked findings table on every PR, and can rewrite Critical/High/Medium findings in place."

branding:
  icon: shield
  color: red

inputs:
  anthropic-api-key:
    description: Anthropic API key (use a repository secret)
    required: true
  github-token:
    description: >
      GitHub token with pull-requests:write. Also contents:write if
      autofix is enabled so rewrites can be committed back to the branch.
      Use secrets.GITHUB_TOKEN for most repos.
    required: true
  base-branch:
    description: "Branch to diff against on PRs and open PRs into on scheduled runs (default: the repo's default branch)"
    required: false
    default: "${{ github.event.repository.default_branch }}"
  model:
    description: "Claude model to use for the review (accepts any value `claude -p --model` accepts: short alias like `sonnet`/`haiku` or a full model id)"
    required: false
    default: sonnet
  autofix:
    description: "If true, grant the reviewer Edit access so it can rewrite vulnerable code. Requires github-token with contents:write. Default false; set to 'true' to opt in."
    required: false
    default: "false"
  max-budget-usd:
    description: Aggregate spend cap (USD) across the review + any autofix pass
    required: false
    default: "5"
  timeout-seconds:
    description: Subprocess timeout passed through to the reviewer CLI
    required: false
    default: "900"

outputs:
  pr-url:
    description: URL of the opened/updated PR (scheduled runs) or the triggering PR (pull_request runs). Empty when nothing was posted.
    value: ${{ steps.post.outputs.pr-url }}
  findings-count:
    description: Total findings returned by the reviewer
    value: ${{ steps.review.outputs.findings-count }}
  exit-code:
    description: Exit code from the reviewer CLI (0 clean, 1 Critical/High findings, 2 infrastructure error)
    value: ${{ steps.review.outputs.exit-code }}

runs:
  using: composite

  steps:
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.11"

    - name: Set up Node
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: "20"

    - name: Install claude CLI
      shell: bash
      run: npm install -g --ignore-scripts '@anthropic-ai/claude-code@2.1.108'

    - name: Check out soundcheck at pinned SHA
      shell: bash
      run: |
        # Pin to a specific commit SHA to prevent supply-chain substitution.
        # Update this SHA when intentionally pulling in new soundcheck changes.
        SOUNDCHECK_SHA="5fdc7ca2d5dcd843681f53d66cf60da952f61a99"
        git clone --filter=blob:none https://github.com/thejefflarson/soundcheck /tmp/soundcheck
        git -C /tmp/soundcheck checkout "$SOUNDCHECK_SHA"

    - name: Run security review
      id: review
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        _EVENT_NAME: ${{ github.event_name }}
        _BASE_BRANCH: ${{ inputs.base-branch }}
        _MODEL: ${{ inputs.model }}
        _MAX_BUDGET: ${{ inputs.max-budget-usd }}
        _TIMEOUT: ${{ inputs.timeout-seconds }}
        _AUTOFIX: ${{ inputs.autofix }}
        _BEFORE: ${{ github.event.before }}
      run: |
        set +e

        EVENT="$_EVENT_NAME"
        BASE="$_BASE_BRANCH"

        # Validate model against an allowlist to prevent argument injection.
        case "$_MODEL" in
          sonnet|haiku|opus|claude-opus-4-5|claude-sonnet-4-5|claude-haiku-4-5|\
          claude-3-5-sonnet-*|claude-3-5-haiku-*|claude-3-opus-*)
            ;;
          *) echo "::error::Invalid model identifier: $_MODEL"; exit 2 ;;
        esac

        # Assemble the CLI args. PRs get a diff-scoped review against the
        # base branch; schedule/workflow_dispatch runs do a full-repo scan.
        ARGS=(
          --repo-dir "$GITHUB_WORKSPACE"
          --skill-path /tmp/soundcheck/.claude/skills/security-review/SKILL.md
          --model "$_MODEL"
          --max-budget-usd "$_MAX_BUDGET"
          --timeout "$_TIMEOUT"
          --output-summary /tmp/soundcheck-summary.md
          --audit-log /tmp/soundcheck-audit.json
        )

        if [ "$EVENT" = "pull_request" ]; then
          # Fetch the base branch so --diff-base has something to diff against.
          git -C "$GITHUB_WORKSPACE" fetch --no-tags --depth=1 origin "$BASE"
          ARGS+=(--diff-base "origin/$BASE")
        elif [ "$EVENT" = "push" ]; then
          # Diff the push against the pre-push tip of the branch.
          # For brand-new branches (before=zeros) fall through to a full scan.
          # Validate BEFORE is a 40-hex-char git SHA to prevent shell injection.
          BEFORE="$_BEFORE"
          if ! [[ "$BEFORE" =~ ^[0-9a-f]{40}$ ]]; then
            BEFORE=""
          fi
          ZERO="0000000000000000000000000000000000000000"
          if [ -n "$BEFORE" ] && [ "$BEFORE" != "$ZERO" ]; then
            git -C "$GITHUB_WORKSPACE" fetch --no-tags --depth=1 origin "$BEFORE" 2>/dev/null || true
            ARGS+=(--diff-base "$BEFORE")
          fi
        fi

        if [ "$_AUTOFIX" = "true" ]; then
          ARGS+=(--autofix)
        fi

        python /tmp/soundcheck/scripts/security-review-action.py "${ARGS[@]}"
        CLI_EXIT=$?
        echo "exit-code=$CLI_EXIT" >> "$GITHUB_OUTPUT"

        if [ -f /tmp/soundcheck-audit.json ]; then
          # jq is preinstalled on ubuntu-latest runners
          FINDINGS=$(jq '.findings_total // 0' /tmp/soundcheck-audit.json)
          # Validate integer to prevent GITHUB_OUTPUT injection via newline.
          if ! [[ "$FINDINGS" =~ ^[0-9]+$ ]]; then FINDINGS=0; fi
        else
          FINDINGS=0
        fi
        echo "findings-count=$FINDINGS" >> "$GITHUB_OUTPUT"

    - name: Detect rewrites
      id: changes
      shell: bash
      run: |
        cd "$GITHUB_WORKSPACE"
        if git diff --quiet; then
          echo "has-changes=false" >> "$GITHUB_OUTPUT"
        else
          echo "has-changes=true" >> "$GITHUB_OUTPUT"
          echo "Rewritten files:"
          git diff --name-only
        fi

    - name: Commit and push rewrites
      id: push
      if: steps.changes.outputs.has-changes == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        _EVENT_NAME: ${{ github.event_name }}
        _HEAD_REF: ${{ github.head_ref }}
        _BASE_BRANCH: ${{ inputs.base-branch }}
      run: |
        cd "$GITHUB_WORKSPACE"
        git config user.name  "soundcheck[bot]"
        git config user.email "soundcheck[bot]@users.noreply.github.com"
        COMMIT_MSG=$'Soundcheck: apply security review fixes\n\nAutomated rewrites from the Soundcheck security review action.'

        # GITHUB_TOKEN is not allowed to modify .github/workflows/*; exclude
        # those paths so pushes don't get rejected when autofix touches them.
        STAGE_SPEC=(-- . ':!.github/workflows')

        if [ "$_EVENT_NAME" = "pull_request" ]; then
          BRANCH="$_HEAD_REF"
          git add -A "${STAGE_SPEC[@]}"
          if git diff --cached --quiet; then
            echo "Only workflow-file rewrites; nothing the default token can push."
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "$COMMIT_MSG"
          git push origin "HEAD:$BRANCH"
        else
          BRANCH="soundcheck/security-review"
          BASE="$_BASE_BRANCH"
          # Stash rewrites, reset to a clean copy of the base, then replay.
          git stash push --include-untracked
          git fetch --no-tags origin "$BASE"
          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            git fetch --no-tags origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BASE"
          else
            git checkout -b "$BRANCH" "origin/$BASE"
          fi
          # Drop stash if it touches .github/ paths to prevent LLM-authored
          # workflow injection from being replayed onto the branch.
          STASH_FILES=$(git stash show --name-only 2>/dev/null || true)
          if echo "$STASH_FILES" | grep -qE '(^|/)\.github/'; then
            echo "::warning::LLM edits include .github/ paths; dropping stash for safety."
            git stash drop
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git stash pop
          git add -A "${STAGE_SPEC[@]}"
          if git diff --cached --quiet; then
            echo "Only workflow-file rewrites; nothing the default token can push."
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "$COMMIT_MSG"
          git push origin "$BRANCH" --force-with-lease
        fi
        echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

    - name: Post findings
      id: post
      if: always()
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        _EVENT_NAME: ${{ github.event_name }}
        _PR_NUMBER: ${{ github.event.pull_request.number }}
        _REPO: ${{ github.repository }}
        _PUSH_BRANCH: ${{ steps.push.outputs.branch }}
        _BASE_BRANCH: ${{ inputs.base-branch }}
      run: |
        RAW_SUMMARY=/tmp/soundcheck-summary.md
        if [ ! -f "$RAW_SUMMARY" ]; then
          echo "No summary file generated; skipping PR/comment."
          exit 0
        fi
        # Truncate LLM-generated markdown to 65 kB before posting to prevent
        # oversized comments and limit the reach of attacker-influenced content.
        BODY_FILE=/tmp/soundcheck-summary-safe.md
        head -c 65536 "$RAW_SUMMARY" > "$BODY_FILE"

        if [ "$_EVENT_NAME" = "pull_request" ]; then
          PR_NUMBER="$_PR_NUMBER"
          gh pr comment "$PR_NUMBER" --body-file "$BODY_FILE" \
            --repo "$_REPO"
          PR_URL=$(gh pr view "$PR_NUMBER" --json url --jq '.url' \
            --repo "$_REPO")
          echo "pr-url=$PR_URL" >> "$GITHUB_OUTPUT"
        elif [ -n "$_PUSH_BRANCH" ]; then
          # Only open a PR if the push step actually committed + pushed a
          # branch. The `changes` step's has-changes can be true even when
          # only workflow files were rewritten (which the default token
          # cannot push), in which case push.outputs.branch is empty.
          BRANCH="$_PUSH_BRANCH"
          BASE="$_BASE_BRANCH"
          TITLE="Soundcheck: security review findings"
          EXISTING=$(gh pr list \
            --head "$BRANCH" --base "$BASE" --state open \
            --json number --jq '.[0].number' \
            --repo "$_REPO" 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            gh pr edit "$EXISTING" --body-file "$BODY_FILE" \
              --repo "$_REPO"
            PR_URL=$(gh pr view "$EXISTING" --json url --jq '.url' \
              --repo "$_REPO")
          else
            PR_URL=$(gh pr create \
              --title "$TITLE" --body-file "$BODY_FILE" \
              --head "$BRANCH" --base "$BASE" \
              --repo "$_REPO" \
              --label security 2>/dev/null || \
            gh pr create \
              --title "$TITLE" --body-file "$BODY_FILE" \
              --head "$BRANCH" --base "$BASE" \
              --repo "$_REPO")
          fi
          # Auto-merge intentionally omitted: LLM-authored security fixes
          # require human review before merging to the default branch.
          echo "pr-url=$PR_URL" >> "$GITHUB_OUTPUT"
        fi

    - name: Write job summary
      if: always()
      shell: bash
      env:
        _PR_URL: ${{ steps.post.outputs.pr-url }}
      run: |
        if [ -f /tmp/soundcheck-summary.md ]; then
          # Cap at 65 kB to prevent oversized job summaries from LLM output.
          head -c 65536 /tmp/soundcheck-summary.md >> "$GITHUB_STEP_SUMMARY"
        else
          echo "No summary generated." >> "$GITHUB_STEP_SUMMARY"
        fi
        if [ -n "$_PR_URL" ]; then
          {
            echo
            echo "**PR:** $_PR_URL"
          } >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Upload audit record
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: soundcheck-audit
        path: /tmp/soundcheck-audit.json
        if-no-files-found: ignore
