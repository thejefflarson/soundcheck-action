name: Soundcheck Security Review
description: "OWASP security review that comments a severity-ranked findings table on every PR, and can rewrite Critical/High/Medium findings in place."

branding:
  icon: shield
  color: red

inputs:
  anthropic-api-key:
    description: Anthropic API key (use a repository secret)
    required: true
  github-token:
    description: >
      GitHub token with pull-requests:write. Also contents:write if
      autofix is enabled so rewrites can be committed back to the branch.
      Use secrets.GITHUB_TOKEN for most repos.
    required: true
  base-branch:
    description: "Branch to diff against on PRs and open PRs into on scheduled runs (default: the repo's default branch)"
    required: false
    default: "${{ github.event.repository.default_branch }}"
  model:
    description: "Claude model to use for the review (accepts any value `claude -p --model` accepts: short alias like `sonnet`/`haiku` or a full model id)"
    required: false
    default: sonnet
  autofix:
    description: "If true, grant the reviewer Edit access so it can rewrite vulnerable code. Requires github-token with contents:write. Default true to match v1 behavior."
    required: false
    default: "true"
  max-budget-usd:
    description: Aggregate spend cap (USD) across the review + any autofix pass
    required: false
    default: "5"
  timeout-seconds:
    description: Subprocess timeout passed through to the reviewer CLI
    required: false
    default: "900"

outputs:
  pr-url:
    description: URL of the opened/updated PR (scheduled runs) or the triggering PR (pull_request runs). Empty when nothing was posted.
    value: ${{ steps.post.outputs.pr-url }}
  findings-count:
    description: Total findings returned by the reviewer
    value: ${{ steps.review.outputs.findings-count }}
  exit-code:
    description: Exit code from the reviewer CLI (0 clean, 1 Critical/High findings, 2 infrastructure error)
    value: ${{ steps.review.outputs.exit-code }}

runs:
  using: composite

  steps:
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.11"

    - name: Set up Node
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: "20"

    - name: Install claude CLI
      shell: bash
      run: npm install -g '@anthropic-ai/claude-code@2.1.108'

    - name: Check out soundcheck at pinned SHA
      shell: bash
      run: |
        # Pin to a specific commit SHA to prevent supply-chain substitution.
        # Update this SHA when intentionally pulling in new soundcheck changes.
        SOUNDCHECK_SHA="6b8a0115382c745e485b7b19612cd1a15d0b09cf"
        git clone --filter=blob:none https://github.com/thejefflarson/soundcheck /tmp/soundcheck
        git -C /tmp/soundcheck checkout "$SOUNDCHECK_SHA"

    - name: Run security review
      id: review
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
      run: |
        set +e

        EVENT="${{ github.event_name }}"
        BASE="${{ inputs.base-branch }}"

        # Assemble the CLI args. PRs get a diff-scoped review against the
        # base branch; schedule/workflow_dispatch runs do a full-repo scan.
        ARGS=(
          --repo-dir "$GITHUB_WORKSPACE"
          --skill-path /tmp/soundcheck/.claude/skills/security-review/SKILL.md
          --model "${{ inputs.model }}"
          --max-budget-usd "${{ inputs.max-budget-usd }}"
          --timeout "${{ inputs.timeout-seconds }}"
          --output-summary /tmp/soundcheck-summary.md
          --audit-log /tmp/soundcheck-audit.json
        )

        if [ "$EVENT" = "pull_request" ]; then
          # Fetch the base branch so --diff-base has something to diff against.
          git -C "$GITHUB_WORKSPACE" fetch --no-tags --depth=1 origin "$BASE"
          ARGS+=(--diff-base "origin/$BASE")
        elif [ "$EVENT" = "push" ]; then
          # Diff the push against the pre-push tip of the branch.
          # For brand-new branches (before=zeros) fall through to a full scan.
          BEFORE="${{ github.event.before }}"
          ZERO="0000000000000000000000000000000000000000"
          if [ -n "$BEFORE" ] && [ "$BEFORE" != "$ZERO" ]; then
            git -C "$GITHUB_WORKSPACE" fetch --no-tags --depth=1 origin "$BEFORE" 2>/dev/null || true
            ARGS+=(--diff-base "$BEFORE")
          fi
        fi

        if [ "${{ inputs.autofix }}" = "true" ]; then
          ARGS+=(--autofix)
        fi

        python /tmp/soundcheck/scripts/security-review-action.py "${ARGS[@]}"
        CLI_EXIT=$?
        echo "exit-code=$CLI_EXIT" >> "$GITHUB_OUTPUT"

        if [ -f /tmp/soundcheck-audit.json ]; then
          # jq is preinstalled on ubuntu-latest runners
          FINDINGS=$(jq '.findings_total // 0' /tmp/soundcheck-audit.json)
        else
          FINDINGS=0
        fi
        echo "findings-count=$FINDINGS" >> "$GITHUB_OUTPUT"

    - name: Detect rewrites
      id: changes
      shell: bash
      run: |
        cd "$GITHUB_WORKSPACE"
        if git diff --quiet; then
          echo "has-changes=false" >> "$GITHUB_OUTPUT"
        else
          echo "has-changes=true" >> "$GITHUB_OUTPUT"
          echo "Rewritten files:"
          git diff --name-only
        fi

    - name: Commit and push rewrites
      id: push
      if: steps.changes.outputs.has-changes == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        cd "$GITHUB_WORKSPACE"
        git config user.name  "soundcheck[bot]"
        git config user.email "soundcheck[bot]@users.noreply.github.com"
        COMMIT_MSG=$'Soundcheck: apply security review fixes\n\nAutomated rewrites from the Soundcheck security review action.'

        # GITHUB_TOKEN is not allowed to modify .github/workflows/*; exclude
        # those paths so pushes don't get rejected when autofix touches them.
        STAGE_SPEC=(-- . ':!.github/workflows')

        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BRANCH="${{ github.head_ref }}"
          git add -A "${STAGE_SPEC[@]}"
          if git diff --cached --quiet; then
            echo "Only workflow-file rewrites; nothing the default token can push."
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "$COMMIT_MSG"
          git push origin "HEAD:$BRANCH"
        else
          BRANCH="soundcheck/security-review"
          BASE="${{ inputs.base-branch }}"
          # Stash rewrites, reset to a clean copy of the base, then replay.
          git stash push --include-untracked
          git fetch --no-tags origin "$BASE"
          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            git fetch --no-tags origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BASE"
          else
            git checkout -b "$BRANCH" "origin/$BASE"
          fi
          git stash pop
          git add -A "${STAGE_SPEC[@]}"
          if git diff --cached --quiet; then
            echo "Only workflow-file rewrites; nothing the default token can push."
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "$COMMIT_MSG"
          git push origin "$BRANCH" --force-with-lease
        fi
        echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

    - name: Post findings
      id: post
      if: always()
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        BODY_FILE=/tmp/soundcheck-summary.md
        if [ ! -f "$BODY_FILE" ]; then
          echo "No summary file generated; skipping PR/comment."
          exit 0
        fi

        if [ "${{ github.event_name }}" = "pull_request" ]; then
          PR_NUMBER="${{ github.event.pull_request.number }}"
          gh pr comment "$PR_NUMBER" --body-file "$BODY_FILE" \
            --repo "${{ github.repository }}"
          PR_URL=$(gh pr view "$PR_NUMBER" --json url --jq '.url' \
            --repo "${{ github.repository }}")
          echo "pr-url=$PR_URL" >> "$GITHUB_OUTPUT"
        elif [ "${{ steps.changes.outputs.has-changes }}" = "true" ]; then
          BRANCH="${{ steps.push.outputs.branch }}"
          BASE="${{ inputs.base-branch }}"
          TITLE="Soundcheck: security review findings"
          EXISTING=$(gh pr list \
            --head "$BRANCH" --base "$BASE" --state open \
            --json number --jq '.[0].number' \
            --repo "${{ github.repository }}" 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            gh pr edit "$EXISTING" --body-file "$BODY_FILE" \
              --repo "${{ github.repository }}"
            PR_URL=$(gh pr view "$EXISTING" --json url --jq '.url' \
              --repo "${{ github.repository }}")
          else
            PR_URL=$(gh pr create \
              --title "$TITLE" --body-file "$BODY_FILE" \
              --head "$BRANCH" --base "$BASE" \
              --repo "${{ github.repository }}" \
              --label security 2>/dev/null || \
            gh pr create \
              --title "$TITLE" --body-file "$BODY_FILE" \
              --head "$BRANCH" --base "$BASE" \
              --repo "${{ github.repository }}")
          fi
          # Queue auto-merge so the PR lands the moment required checks pass.
          # Non-fatal if the repo hasn't enabled auto-merge or required checks
          # are still configuring — the PR just stays open for manual review.
          gh pr merge "$PR_URL" --auto --merge \
            --repo "${{ github.repository }}" 2>/dev/null || \
            echo "Auto-merge not enabled on repo; PR stays open."
          echo "pr-url=$PR_URL" >> "$GITHUB_OUTPUT"
        fi

    - name: Write job summary
      if: always()
      shell: bash
      run: |
        if [ -f /tmp/soundcheck-summary.md ]; then
          cat /tmp/soundcheck-summary.md >> "$GITHUB_STEP_SUMMARY"
        else
          echo "No summary generated." >> "$GITHUB_STEP_SUMMARY"
        fi
        if [ -n "${{ steps.post.outputs.pr-url }}" ]; then
          {
            echo
            echo "**PR:** ${{ steps.post.outputs.pr-url }}"
          } >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Upload audit record
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: soundcheck-audit
        path: /tmp/soundcheck-audit.json
        if-no-files-found: ignore
